name: Publish State

# Polls the latest trader cache, merges strategy_state.json + SQLite trade
# history into docs/status.json, and deploys to GitHub Pages.
#
# Trigger order (most to least reliable):
#   1. repository_dispatch (external cron, e.g. cron-job.org)
#      → 5-minute precision GUARANTEED, fires within seconds
#   2. schedule cron */5 (GitHub native)
#      → 65~273 min lag in practice (GitHub throttles short crons)
#      → kept as fallback only
#   3. workflow_dispatch (manual)
#
# See EXTERNAL_CRON_SETUP.md for cron-job.org configuration.

on:
  repository_dispatch:
    types: [publish_state]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: publish-state
  cancel-in-progress: true

permissions:
  contents: write
  pages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore trader cache (read-only)
        # paths MUST match autotrader.yml save step exactly — cache@v4 treats
        # path mismatch as a miss even when key/restore-keys match.
        uses: actions/cache/restore@v4
        with:
          path: |
            user_data/logs/
            user_data/tradesv3.sqlite
            user_data/models/
            user_data/freqaimodels/
          key: trader-state-${{ github.run_id }}
          restore-keys: |
            trader-state-

      - name: Publish state
        run: python scripts/publish_state.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
