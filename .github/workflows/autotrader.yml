name: Crypto AutoTrader

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 4 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:

concurrency:
  group: crypto-autotrader
  cancel-in-progress: true

permissions:
  contents: write
  pages: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libta-lib0-dev || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install TA-Lib || echo "TA-Lib C binding skipped, using pandas-ta"

      - name: Restore cached state
        uses: actions/cache/restore@v4
        with:
          path: |
            user_data/logs/
            user_data/tradesv3.sqlite
            user_data/models/
            user_data/freqaimodels/
          key: trader-state-${{ github.run_id }}
          restore-keys: |
            trader-state-

      - name: Run trader (dry-run)
        env:
          FREQTRADE__EXCHANGE__KEY: ${{ secrets.UPBIT_API_KEY }}
          FREQTRADE__EXCHANGE__SECRET: ${{ secrets.UPBIT_API_SECRET }}
        run: |
          timeout 13200 freqtrade trade \
            --config configs/config.json \
            --strategy CryptoFusionStrategy \
            --freqaimodel LightGBMClassifier \
            --logfile user_data/logs/freqtrade.log \
            --db-url sqlite:///user_data/tradesv3.sqlite \
          || true

      - name: Generate status report
        if: always()
        run: python scripts/generate_status.py || echo "Status generation skipped"

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            user_data/logs/
            user_data/tradesv3.sqlite
            user_data/models/
            user_data/freqaimodels/
          key: trader-state-${{ github.run_id }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ github.run_number }}
          path: |
            user_data/logs/
            docs/status.json
          retention-days: 30

      - name: Deploy status to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
