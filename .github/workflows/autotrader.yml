name: Crypto AutoTrader

on:
  schedule:
    # 24/7 코인 마켓 — 4시간 간격 트리거 (UTC)
    # GitHub Actions 지연 대비 중복 트리거 포함
    - cron: "0 0 * * *"    # 00:00 UTC = 09:00 KST
    - cron: "0 4 * * *"    # 04:00 UTC = 13:00 KST
    - cron: "0 8 * * *"    # 08:00 UTC = 17:00 KST
    - cron: "0 12 * * *"   # 12:00 UTC = 21:00 KST
    - cron: "0 16 * * *"   # 16:00 UTC = 01:00 KST
    - cron: "0 20 * * *"   # 20:00 UTC = 05:00 KST
  workflow_dispatch:

concurrency:
  group: crypto-autotrader
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4시간 최대

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install freqtrade
          pip install ta-lib || pip install pandas-ta
          pip install hmmlearn lightgbm scikit-learn

      - name: Restore cached state
        uses: actions/cache/restore@v4
        with:
          path: |
            user_data/logs/
            user_data/tradesv3.sqlite
            user_data/models/
          key: trader-state-${{ github.run_id }}
          restore-keys: |
            trader-state-

      - name: Create .env
        run: |
          cat > .env <<EOF
          FREQTRADE__EXCHANGE__KEY=${{ secrets.UPBIT_API_KEY }}
          FREQTRADE__EXCHANGE__SECRET=${{ secrets.UPBIT_API_SECRET }}
          EOF

      - name: Run trader (dry-run)
        env:
          FREQTRADE__EXCHANGE__KEY: ${{ secrets.UPBIT_API_KEY }}
          FREQTRADE__EXCHANGE__SECRET: ${{ secrets.UPBIT_API_SECRET }}
        run: |
          timeout 13200 freqtrade trade \
            --config configs/config.json \
            --strategy CryptoFusionStrategy \
            --logfile user_data/logs/freqtrade.log \
            --db-url sqlite:///user_data/tradesv3.sqlite \
          || true  # timeout exit code 124 무시

      - name: Generate status report
        if: always()
        run: |
          python scripts/generate_status.py || echo "Status generation skipped"

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            user_data/logs/
            user_data/tradesv3.sqlite
            user_data/models/
          key: trader-state-${{ github.run_id }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ github.run_number }}
          path: |
            user_data/logs/
            docs/status.json
          retention-days: 30

      - name: Deploy status to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
