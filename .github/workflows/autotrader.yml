name: Crypto AutoTrader

on:
  # 매시 fire — concurrency group이 동시 1개만 가동시키고 나머지 queue.
  # cycle 종료 직후 queue된 cron이 자동 시작 → gap 거의 0.
  # public repo라 Actions 분 무제한, 자주 fire해도 비용 0.
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      live_trading:
        description: "Set to 'I_UNDERSTAND_THE_RISK' to enable live trading (dry_run=false)"
        required: false
        default: "no"

concurrency:
  group: crypto-autotrader
  cancel-in-progress: false

permissions:
  contents: write
  pages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trade:
    runs-on: ubuntu-latest
    # 280min = 4h40m — 어제 5h 1min run이 240min(4h) timeout 초과한 사례 반영
    timeout-minutes: 280

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libta-lib0-dev || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install TA-Lib || echo "TA-Lib C binding skipped, using pandas-ta"

      - name: Restore cached state
        uses: actions/cache/restore@v4
        with:
          path: |
            user_data/logs/
            user_data/tradesv3.sqlite
            user_data/models/
            user_data/freqaimodels/
          key: trader-state-${{ github.run_id }}
          restore-keys: |
            trader-state-

      - name: Clean stale FreqAI models
        run: |
          for d in user_data/models user_data/freqaimodels; do
            [ -d "$d" ] && find "$d" -maxdepth 1 -type d \
              \( -name "crypto_fusion_lgbm" -o -name "crypto_fusion_lgbm_v2" -o -name "crypto_fusion_lgbm_v3" -o -name "crypto_fusion_lgbm_v4" \) \
              -exec rm -rf {} + 2>/dev/null || true
          done

      - name: Decide trading mode (live gate)
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             && [ "${{ github.event.inputs.live_trading }}" = "I_UNDERSTAND_THE_RISK" ]; then
            echo "dry_run_flag=--dry-run-wallet 1000000" >> "$GITHUB_OUTPUT"
            echo "live=true" >> "$GITHUB_OUTPUT"
            echo "::warning::LIVE TRADING ENABLED for this run"
          else
            echo "dry_run_flag=" >> "$GITHUB_OUTPUT"
            echo "live=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run trader
        env:
          FREQTRADE__EXCHANGE__KEY: ${{ secrets.UPBIT_API_KEY }}
          FREQTRADE__EXCHANGE__SECRET: ${{ secrets.UPBIT_API_SECRET }}
          FREQTRADE__TELEGRAM__TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FREQTRADE__TELEGRAM__CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FREQTRADE__DRY_RUN: ${{ steps.mode.outputs.live == 'true' && 'false' || 'true' }}
        run: |
          timeout 16500 freqtrade trade \
            --config configs/config.json \
            --strategy CryptoFusionStrategyP3 \
            --freqaimodel LightGBMRegressor \
            --logfile user_data/logs/freqtrade.log \
            --db-url sqlite:///user_data/tradesv3.sqlite \
          || true

      - name: Generate status report
        if: always()
        # publish_state.py = generate_status + strategy_state.json merge
        # → dashboard의 per-pair / decisions / thresholds 섹션이 채워짐
        run: python scripts/publish_state.py || echo "Status generation skipped"

      - name: Generate trading journal
        if: always()
        run: python scripts/generate_journal.py || echo "Journal generation skipped"

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            user_data/logs/
            user_data/tradesv3.sqlite
            user_data/models/
            user_data/freqaimodels/
          key: trader-state-${{ github.run_id }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ github.run_number }}
          path: |
            user_data/logs/
            user_data/logs/journal/
            docs/status.json
          retention-days: 30

      - name: Deploy status to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true

      - name: Telegram failure alert
        if: failure()
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$BOT" ] && [ -n "$CHAT" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
              -d chat_id="${CHAT}" \
              -d text="[crypto-autotrader] workflow failed: run ${{ github.run_number }} - https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              > /dev/null || true
          fi
