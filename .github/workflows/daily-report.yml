name: Daily Report + Dashboard

on:
  schedule:
    - cron: "0 15 * * *"  # 15:00 UTC = 00:00 KST (자정 리포트)
  workflow_dispatch:

permissions:
  contents: write
  pages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: |
            user_data/logs/
            user_data/tradesv3.sqlite
          key: trader-state-
          restore-keys: trader-state-

      - name: Generate status report
        run: python scripts/generate_status.py

      - name: Generate daily journal
        run: python scripts/generate_journal.py

      - name: Commit journal to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d user_data/logs/journal ] && [ -n "$(ls user_data/logs/journal/*.md 2>/dev/null)" ]; then
            git add user_data/logs/journal/
            git diff --cached --quiet || git commit -m "journal: $(date -u +%Y-%m-%d) 일일 투자 일기"
            git push || echo "Push skipped (conflict or no changes)"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
