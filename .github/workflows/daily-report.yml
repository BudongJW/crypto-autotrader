name: Daily Report + Dashboard

on:
  schedule:
    - cron: "0 15 * * *"  # 15:00 UTC = 00:00 KST (자정 리포트)
  workflow_dispatch:

permissions:
  contents: write
  pages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore state
        # paths MUST match autotrader.yml save step exactly — cache@v4 treats
        # path mismatch as a miss even when restore-keys matches.
        uses: actions/cache/restore@v4
        with:
          path: |
            user_data/logs/
            user_data/tradesv3.sqlite
            user_data/models/
            user_data/freqaimodels/
          key: trader-state-${{ github.run_id }}
          restore-keys: |
            trader-state-

      - name: Generate status report
        # publish_state.py = generate_status + strategy_state.json merge
        run: python scripts/publish_state.py

      - name: Generate daily journal
        run: python scripts/generate_journal.py

      - name: Commit journal to repo
        # .gitignore 예외 추가 + -f 폴백 — gitignore 규칙 변경 누락 시에도 작동.
        # set -e 하에서 git add 실패가 step을 죽이지 않게 || true 추가.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d user_data/logs/journal ] && [ -n "$(ls user_data/logs/journal/*.md 2>/dev/null)" ]; then
            git add -f user_data/logs/journal/ || true
            git diff --cached --quiet || git commit -m "journal: $(date -u +%Y-%m-%d) 일일 투자 일기"
            git push || echo "Push skipped (conflict or no changes)"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
