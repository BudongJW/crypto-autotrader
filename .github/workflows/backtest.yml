name: Weekly Backtest

on:
  # 매일 01:00 UTC (10:00 KST) — 시장 변화 신속 추적.
  # public repo Actions 분 무제한, 백테스트는 60~90분/회 정도라 부담 X.
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "백테스트 기간 (일). 30/60/90"
        required: false
        default: "30"
      strategies:
        description: "공백 구분 strategy 리스트"
        required: false
        default: "CryptoFusionStrategy CryptoFusionStrategyP1P2"
      freqai:
        description: "FreqAI(LightGBM) 사용 여부 (true/false). false면 빠른 비교 모드 (~15분)"
        required: false
        default: "true"
      pairs:
        description: "백테스트 페어 override (공백 구분, 빈값이면 config의 whitelist 사용)"
        required: false
        default: ""
      timeout:
        description: "워크플로 timeout (분)"
        required: false
        default: "180"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libta-lib0-dev || true

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install TA-Lib || echo "TA-Lib C binding skipped"

      - name: Resolve inputs
        id: cfg
        run: |
          DAYS="${{ github.event.inputs.days }}"
          STRATS="${{ github.event.inputs.strategies }}"
          FREQAI="${{ github.event.inputs.freqai }}"
          PAIRS="${{ github.event.inputs.pairs }}"
          DAYS="${DAYS:-30}"
          STRATS="${STRATS:-CryptoFusionStrategy CryptoFusionStrategyP1P2}"
          FREQAI="${FREQAI:-true}"

          # FreqAI ON: train_period_days(=45) buffer 필요
          # FreqAI OFF: SMA200 + indicator buffer만 (10일이면 충분)
          if [ "$FREQAI" = "true" ]; then
            DOWNLOAD_DAYS=$((DAYS + 50))
          else
            DOWNLOAD_DAYS=$((DAYS + 10))
          fi

          SINCE=$(date -u -d "${DAYS} days ago" +%Y%m%d)
          UNTIL=$(date -u -d "1 day ago" +%Y%m%d)

          echo "days=$DAYS"                   >> "$GITHUB_OUTPUT"
          echo "download_days=$DOWNLOAD_DAYS" >> "$GITHUB_OUTPUT"
          echo "strategies=$STRATS"           >> "$GITHUB_OUTPUT"
          echo "freqai=$FREQAI"               >> "$GITHUB_OUTPUT"
          echo "pairs=$PAIRS"                 >> "$GITHUB_OUTPUT"
          echo "since=$SINCE"                 >> "$GITHUB_OUTPUT"
          echo "until=$UNTIL"                 >> "$GITHUB_OUTPUT"
          echo "Resolved: days=$DAYS download=$DOWNLOAD_DAYS freqai=$FREQAI pairs='$PAIRS' timerange=${SINCE}-${UNTIL}"

      - name: Download data
        run: |
          freqtrade download-data \
            --config configs/config-backtest.json \
            --timeframes 5m 15m 1h \
            --days ${{ steps.cfg.outputs.download_days }}

      - name: Run backtest — baseline + variants (--strategy-list)
        run: |
          set -o pipefail
          ARGS=()
          CFG=configs/config-backtest.json
          if [ "${{ steps.cfg.outputs.freqai }}" = "true" ]; then
            ARGS+=( --freqaimodel LightGBMRegressor )
          else
            # FreqAI 끄려면 config.json의 freqai 섹션을 enabled=false로 덮어써야 한다.
            # add_config_files로 상속받은 base config의 freqai 섹션이 우선이라
            # 별도 override 파일을 동적으로 생성.
            python -c "
          import json, copy
          with open('configs/config-backtest.json') as f: bt = json.load(f)
          bt['freqai'] = {'enabled': False}
          with open('configs/config-backtest-nofreqai.json', 'w') as f:
              json.dump(bt, f, indent=2)
          "
            CFG=configs/config-backtest-nofreqai.json
            echo "FreqAI disabled — using $CFG"
          fi
          PAIRS_OVR="${{ steps.cfg.outputs.pairs }}"
          if [ -n "$PAIRS_OVR" ]; then
            # shellcheck disable=SC2086
            ARGS+=( --pairs $PAIRS_OVR )
          fi
          echo "Config: $CFG  Extra args: ${ARGS[*]}"
          mkdir -p /tmp/bt-logs
          freqtrade backtesting \
            --config "$CFG" \
            --strategy-list ${{ steps.cfg.outputs.strategies }} \
            --timerange "${{ steps.cfg.outputs.since }}-${{ steps.cfg.outputs.until }}" \
            --export trades \
            --cache none \
            "${ARGS[@]}" 2>&1 | tee /tmp/bt-logs/run.log

      - name: Self-diagnose on failure
        if: failure()
        run: |
          LOG=/tmp/bt-logs/run.log
          OUT=diagnostic.md
          {
            echo "## ❌ Backtest failure — 자동 진단"
            echo ""
            echo "**Run**: ${{ github.run_id }}  **Config**: freqai=${{ steps.cfg.outputs.freqai }} timerange=${{ steps.cfg.outputs.since }}-${{ steps.cfg.outputs.until }}"
            echo ""
            echo "### 알려진 패턴 매칭"
            echo ""
            MATCH=0
            if [ -f "$LOG" ] && grep -q "open ended timeranges" "$LOG"; then
              MATCH=1
              echo "- **FreqAI open-ended timerange**: \`--timerange A-B\` 둘 다 명시 필요. workflow의 since/until 값 확인."
            fi
            if [ -f "$LOG" ] && grep -q "No freqaimodel set" "$LOG"; then
              MATCH=1
              echo "- **No freqaimodel set**: config에 freqai 섹션 있는데 \`--freqaimodel\` 미전달. freqai=false 모드면 config의 freqai.enabled=false override 확인."
            fi
            if [ -f "$LOG" ] && grep -q "No data left after adjusting" "$LOG"; then
              MATCH=1
              echo "- **Startup candle 데이터 부족**: download_days 증가 (현재 ${{ steps.cfg.outputs.download_days }}) 또는 timerange 단축 (현재 ${{ steps.cfg.outputs.days }}일)."
            fi
            if [ -f "$LOG" ] && grep -q "Could not fetch historical candle" "$LOG"; then
              MATCH=1
              echo "- **거래소 OHLCV fetch 실패**: Upbit rate limit 또는 페어 잘못. pair 줄이거나 retry."
            fi
            if [ -f "$LOG" ] && grep -qE "ImportError|ModuleNotFoundError" "$LOG"; then
              MATCH=1
              echo "- **Import 에러**: strategy 모듈 import 실패. P1P2 같은 변형 strategy의 상속 import 경로 확인."
            fi
            if [ -f "$LOG" ] && grep -q "no attribute 'freqai_info'" "$LOG"; then
              MATCH=1
              echo "- **freqai_info 없음**: FreqAI를 껐는데 strategy가 \`self.freqai_info\`에 접근. strategy 코드가 FreqAI on 상태를 가정함. → FreqAI=true로 돌리거나 strategy의 freqai_info 접근 부분에 fallback 추가."
            fi
            if [ -f "$LOG" ] && grep -qE "AttributeError|KeyError" "$LOG"; then
              MATCH=1
              echo "- **속성/키 에러**: strategy 코드의 dataframe 컬럼 또는 trade 속성 누락. 자세한 traceback ↓"
            fi
            if [ "$MATCH" = "0" ]; then
              echo "- (알려진 패턴 매칭 안 됨. 로그 직접 확인 필요)"
            fi
            echo ""
            echo "### 마지막 20줄 (raw)"
            echo ""
            echo '```'
            if [ -f "$LOG" ]; then tail -20 "$LOG"; else echo "(no log)"; fi
            echo '```'
            echo ""
            echo "### 에러/traceback 추출"
            echo ""
            echo '```'
            if [ -f "$LOG" ]; then grep -iE "ERROR|Traceback|Exception" "$LOG" | tail -20; else echo "(no log)"; fi
            echo '```'
          } > "$OUT"
          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"
          cp "$OUT" backtest_summary.md  # artifact로 함께 업로드되게

      - name: Compare summary
        if: always()
        run: |
          python scripts/compare_backtest.py \
            user_data/backtest_results/ \
            > backtest_summary.md || true
          echo "## Backtest summary" >> $GITHUB_STEP_SUMMARY
          cat backtest_summary.md   >> $GITHUB_STEP_SUMMARY || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_number }}
          path: |
            user_data/backtest_results/
            backtest_summary.md
          retention-days: 30
