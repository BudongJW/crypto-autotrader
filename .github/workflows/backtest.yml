name: Weekly Backtest

on:
  schedule:
    - cron: "0 1 * * 0"  # 매주 일요일 01:00 UTC = 10:00 KST
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Freqtrade
        run: |
          pip install freqtrade
          pip install ta-lib || pip install pandas-ta
          pip install hmmlearn lightgbm scikit-learn

      - name: Download data
        run: |
          freqtrade download-data \
            --config configs/config-backtest.json \
            --timeframes 5m 15m 1h \
            --days 90

      - name: Run backtest
        run: |
          freqtrade backtesting \
            --config configs/config-backtest.json \
            --strategy CryptoFusionStrategy \
            --timerange "$(date -d '3 months ago' +%Y%m%d)-" \
            --export trades \
            || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_number }}
          path: user_data/backtest_results/
          retention-days: 30
