name: Weekly Backtest

on:
  schedule:
    - cron: "0 1 * * 0"
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libta-lib0-dev || true

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install TA-Lib || echo "TA-Lib C binding skipped"

      - name: Download data
        run: |
          freqtrade download-data \
            --config configs/config-backtest.json \
            --timeframes 5m 15m 1h \
            --days 90

      - name: Run backtest (with FreqAI)
        run: |
          freqtrade backtesting \
            --config configs/config-backtest.json \
            --strategy CryptoFusionStrategy \
            --freqaimodel LightGBMRegressor \
            --timerange "$(date -d '3 months ago' +%Y%m%d)-" \
            --export trades \
            || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_number }}
          path: user_data/backtest_results/
          retention-days: 30
