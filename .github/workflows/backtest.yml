name: Weekly Backtest

on:
  # л§Өмқј 01:00 UTC (10:00 KST) вҖ” мӢңмһҘ ліҖнҷ” мӢ мҶҚ м¶”м Ғ.
  # public repo Actions л¶„ л¬ҙм ңн•ң, л°ұн…ҢмҠӨнҠёлҠ” 60~90л¶„/нҡҢ м •лҸ„лқј л¶ҖлӢҙ X.
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "л°ұн…ҢмҠӨнҠё кё°к°„ (мқј). 30/60/90"
        required: false
        default: "30"
      strategies:
        description: "кіөл°ұ кө¬л¶„ strategy лҰ¬мҠӨнҠё"
        required: false
        default: "CryptoFusionStrategy CryptoFusionStrategyP1P2"
      freqai:
        description: "FreqAI(LightGBM) мӮ¬мҡ© м—¬л¶Җ (true/false). falseл©ҙ л№ лҘё л№„көҗ лӘЁл“ң (~15л¶„)"
        required: false
        default: "true"
      pairs:
        description: "л°ұн…ҢмҠӨнҠё нҺҳм–ҙ override (кіөл°ұ кө¬л¶„, л№Ҳк°’мқҙл©ҙ configмқҳ whitelist мӮ¬мҡ©)"
        required: false
        default: ""
      timeout:
        description: "мӣҢнҒ¬н”ҢлЎң timeout (л¶„)"
        required: false
        default: "180"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libta-lib0-dev || true

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install TA-Lib || echo "TA-Lib C binding skipped"

      - name: Resolve inputs
        id: cfg
        run: |
          DAYS="${{ github.event.inputs.days }}"
          STRATS="${{ github.event.inputs.strategies }}"
          FREQAI="${{ github.event.inputs.freqai }}"
          PAIRS="${{ github.event.inputs.pairs }}"
          DAYS="${DAYS:-30}"
          STRATS="${STRATS:-CryptoFusionStrategy CryptoFusionStrategyP1P2}"
          FREQAI="${FREQAI:-true}"

          # FreqAI ON: train_period_days(=45) buffer н•„мҡ”
          # FreqAI OFF: SMA200 + indicator bufferл§Ң (10мқјмқҙл©ҙ м¶©л¶„)
          if [ "$FREQAI" = "true" ]; then
            DOWNLOAD_DAYS=$((DAYS + 50))
          else
            DOWNLOAD_DAYS=$((DAYS + 10))
          fi

          SINCE=$(date -u -d "${DAYS} days ago" +%Y%m%d)
          UNTIL=$(date -u -d "1 day ago" +%Y%m%d)

          echo "days=$DAYS"                   >> "$GITHUB_OUTPUT"
          echo "download_days=$DOWNLOAD_DAYS" >> "$GITHUB_OUTPUT"
          echo "strategies=$STRATS"           >> "$GITHUB_OUTPUT"
          echo "freqai=$FREQAI"               >> "$GITHUB_OUTPUT"
          echo "pairs=$PAIRS"                 >> "$GITHUB_OUTPUT"
          echo "since=$SINCE"                 >> "$GITHUB_OUTPUT"
          echo "until=$UNTIL"                 >> "$GITHUB_OUTPUT"
          echo "Resolved: days=$DAYS download=$DOWNLOAD_DAYS freqai=$FREQAI pairs='$PAIRS' timerange=${SINCE}-${UNTIL}"

      - name: Download data
        run: |
          freqtrade download-data \
            --config configs/config-backtest.json \
            --timeframes 5m 15m 1h \
            --days ${{ steps.cfg.outputs.download_days }}

      - name: Run backtest вҖ” baseline + variants (--strategy-list)
        run: |
          set -o pipefail
          ARGS=()
          CFG=configs/config-backtest.json
          if [ "${{ steps.cfg.outputs.freqai }}" = "true" ]; then
            ARGS+=( --freqaimodel LightGBMRegressor )
          else
            # FreqAI лҒ„л Өл©ҙ config.jsonмқҳ freqai м„№м…ҳмқ„ enabled=falseлЎң лҚ®м–ҙмҚЁм•ј н•ңлӢӨ.
            # add_config_filesлЎң мғҒмҶҚл°ӣмқҖ base configмқҳ freqai м„№м…ҳмқҙ мҡ°м„ мқҙлқј
            # лі„лҸ„ override нҢҢмқјмқ„ лҸҷм ҒмңјлЎң мғқм„ұ.
            python -c "
          import json, copy
          with open('configs/config-backtest.json') as f: bt = json.load(f)
          bt['freqai'] = {'enabled': False}
          with open('configs/config-backtest-nofreqai.json', 'w') as f:
              json.dump(bt, f, indent=2)
          "
            CFG=configs/config-backtest-nofreqai.json
            echo "FreqAI disabled вҖ” using $CFG"
          fi
          PAIRS_OVR="${{ steps.cfg.outputs.pairs }}"
          if [ -n "$PAIRS_OVR" ]; then
            # shellcheck disable=SC2086
            ARGS+=( --pairs $PAIRS_OVR )
          fi
          echo "Config: $CFG  Extra args: ${ARGS[*]}"
          mkdir -p /tmp/bt-logs
          freqtrade backtesting \
            --config "$CFG" \
            --strategy-list ${{ steps.cfg.outputs.strategies }} \
            --timerange "${{ steps.cfg.outputs.since }}-${{ steps.cfg.outputs.until }}" \
            --export trades \
            --cache none \
            "${ARGS[@]}" 2>&1 | tee /tmp/bt-logs/run.log

      - name: Self-diagnose on failure
        if: failure()
        run: |
          LOG=/tmp/bt-logs/run.log
          OUT=diagnostic.md
          {
            echo "## вқҢ Backtest failure вҖ” мһҗлҸҷ м§„лӢЁ"
            echo ""
            echo "**Run**: ${{ github.run_id }}  **Config**: freqai=${{ steps.cfg.outputs.freqai }} timerange=${{ steps.cfg.outputs.since }}-${{ steps.cfg.outputs.until }}"
            echo ""
            echo "### м•Ңл Өм§„ нҢЁн„ҙ л§Өм№ӯ"
            echo ""
            MATCH=0
            if [ -f "$LOG" ] && grep -q "open ended timeranges" "$LOG"; then
              MATCH=1
              echo "- **FreqAI open-ended timerange**: \`--timerange A-B\` л‘ҳ лӢӨ лӘ…мӢң н•„мҡ”. workflowмқҳ since/until к°’ нҷ•мқё."
            fi
            if [ -f "$LOG" ] && grep -q "No freqaimodel set" "$LOG"; then
              MATCH=1
              echo "- **No freqaimodel set**: configм—җ freqai м„№м…ҳ мһҲлҠ”лҚ° \`--freqaimodel\` лҜём „лӢ¬. freqai=false лӘЁл“ңл©ҙ configмқҳ freqai.enabled=false override нҷ•мқё."
            fi
            if [ -f "$LOG" ] && grep -q "No data left after adjusting" "$LOG"; then
              MATCH=1
              echo "- **Startup candle лҚ°мқҙн„° л¶ҖмЎұ**: download_days мҰқк°Җ (нҳ„мһ¬ ${{ steps.cfg.outputs.download_days }}) лҳҗлҠ” timerange лӢЁм¶• (нҳ„мһ¬ ${{ steps.cfg.outputs.days }}мқј)."
            fi
            if [ -f "$LOG" ] && grep -q "Could not fetch historical candle" "$LOG"; then
              MATCH=1
              echo "- **кұ°лһҳмҶҢ OHLCV fetch мӢӨнҢЁ**: Upbit rate limit лҳҗлҠ” нҺҳм–ҙ мһҳлӘ». pair мӨ„мқҙкұ°лӮҳ retry."
            fi
            if [ -f "$LOG" ] && grep -qE "ImportError|ModuleNotFoundError" "$LOG"; then
              MATCH=1
              echo "- **Import м—җлҹ¬**: strategy лӘЁл“Ҳ import мӢӨнҢЁ. P1P2 к°ҷмқҖ ліҖнҳ• strategyмқҳ мғҒмҶҚ import кІҪлЎң нҷ•мқё."
            fi
            if [ -f "$LOG" ] && grep -qE "AttributeError|KeyError" "$LOG"; then
              MATCH=1
              echo "- **мҶҚм„ұ/нӮӨ м—җлҹ¬**: strategy мҪ”л“ңмқҳ dataframe м»¬лҹј лҳҗлҠ” trade мҶҚм„ұ лҲ„лқҪ. мһҗм„ён•ң traceback вҶ“"
            fi
            if [ "$MATCH" = "0" ]; then
              echo "- (м•Ңл Өм§„ нҢЁн„ҙ л§Өм№ӯ м•Ҳ лҗЁ. лЎңк·ё м§Ғм ‘ нҷ•мқё н•„мҡ”)"
            fi
            echo ""
            echo "### л§Ҳм§Җл§ү 20мӨ„ (raw)"
            echo ""
            echo '```'
            if [ -f "$LOG" ]; then tail -20 "$LOG"; else echo "(no log)"; fi
            echo '```'
            echo ""
            echo "### м—җлҹ¬/traceback м¶”м¶ң"
            echo ""
            echo '```'
            if [ -f "$LOG" ]; then grep -iE "ERROR|Traceback|Exception" "$LOG" | tail -20; else echo "(no log)"; fi
            echo '```'
          } > "$OUT"
          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"
          cp "$OUT" backtest_summary.md  # artifactлЎң н•Ёк»ҳ м—…лЎңл“ңлҗҳкІҢ

      - name: Compare summary
        if: always()
        run: |
          python scripts/compare_backtest.py \
            user_data/backtest_results/ \
            > backtest_summary.md || true
          echo "## Backtest summary" >> $GITHUB_STEP_SUMMARY
          cat backtest_summary.md   >> $GITHUB_STEP_SUMMARY || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_number }}
          path: |
            user_data/backtest_results/
            backtest_summary.md
          retention-days: 30
