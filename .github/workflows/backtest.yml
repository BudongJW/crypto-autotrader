name: Weekly Backtest

on:
  # 매일 01:00 UTC (10:00 KST) — 시장 변화 신속 추적.
  # public repo Actions 분 무제한, 백테스트는 60~90분/회 정도라 부담 X.
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "데이터 기간 (일). 30/60/90"
        required: false
        default: "30"
      strategies:
        description: "공백 구분 strategy 리스트 (default: 베이스 + P1P2)"
        required: false
        default: "CryptoFusionStrategy CryptoFusionStrategyP1P2"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libta-lib0-dev || true

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install TA-Lib || echo "TA-Lib C binding skipped"

      - name: Resolve inputs
        id: cfg
        run: |
          DAYS="${{ github.event.inputs.days }}"
          STRATS="${{ github.event.inputs.strategies }}"
          DAYS="${DAYS:-30}"
          STRATS="${STRATS:-CryptoFusionStrategy CryptoFusionStrategyP1P2}"
          # FreqAI 요구사항:
          #  1) close-ended timerange (--timerange A-B 둘 다 명시)
          #  2) train_period_days(=45) 만큼 백테스트 시작 전 추가 데이터 필요
          # → 다운로드 = DAYS + 50, 백테스트 timerange = 최근 DAYS만.
          DOWNLOAD_DAYS=$((DAYS + 50))
          SINCE=$(date -u -d "${DAYS} days ago" +%Y%m%d)
          UNTIL=$(date -u -d "1 day ago" +%Y%m%d)
          echo "days=$DAYS"                   >> "$GITHUB_OUTPUT"
          echo "download_days=$DOWNLOAD_DAYS" >> "$GITHUB_OUTPUT"
          echo "strategies=$STRATS"           >> "$GITHUB_OUTPUT"
          echo "since=$SINCE"                 >> "$GITHUB_OUTPUT"
          echo "until=$UNTIL"                 >> "$GITHUB_OUTPUT"
          echo "Resolved: backtest_days=$DAYS download_days=$DOWNLOAD_DAYS timerange=${SINCE}-${UNTIL} strategies='$STRATS'"

      - name: Download data
        run: |
          freqtrade download-data \
            --config configs/config-backtest.json \
            --timeframes 5m 15m 1h \
            --days ${{ steps.cfg.outputs.download_days }}

      - name: Run backtest — baseline + P1P2 (--strategy-list)
        run: |
          freqtrade backtesting \
            --config configs/config-backtest.json \
            --strategy-list ${{ steps.cfg.outputs.strategies }} \
            --freqaimodel LightGBMRegressor \
            --timerange "${{ steps.cfg.outputs.since }}-${{ steps.cfg.outputs.until }}" \
            --export trades \
            --cache none

      - name: Compare summary
        if: always()
        run: |
          python scripts/compare_backtest.py \
            user_data/backtest_results/ \
            > backtest_summary.md || true
          echo "## Backtest summary" >> $GITHUB_STEP_SUMMARY
          cat backtest_summary.md   >> $GITHUB_STEP_SUMMARY || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_number }}
          path: |
            user_data/backtest_results/
            backtest_summary.md
          retention-days: 30
